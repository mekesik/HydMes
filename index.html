<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HydMes - Messenger</title>
    <style>
        body { background: #0e1621; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        /* Твой красный префикс Owner */
        .prefix-owner { color: #ff4d4d; font-weight: bold; text-transform: uppercase; margin-right: 5px; text-shadow: 0 0 8px rgba(255, 77, 77, 0.6); }
        .prefix-mod { color: #ffa500; font-weight: bold; margin-right: 5px; }
        
        .message { background: #182533; padding: 10px; border-radius: 10px; max-width: 70%; position: relative; }
        .controls { background: #17212b; padding: 15px; display: flex; gap: 10px; align-items: center; }
        input { flex: 1; background: #242f3d; border: none; padding: 12px; border-radius: 8px; color: white; outline: none; }
        button { background: #2b5278; border: none; color: white; padding: 10px 15px; border-radius: 8px; cursor: pointer; }
        .premium-btn { background: #f1c40f; color: black; font-weight: bold; }
        .circle-btn { border-radius: 50%; width: 40px; height: 40px; background: #5288c1; }
    </style>
</head>
<body>
    <div id="chat-window">
        <div class="message"><span class="prefix-owner">[Owner]</span> HydMes: Добро пожаловать! Введите /addown чтобы стать создателем.</div>
    </div>
    
    <div class="controls">
        <button class="circle-btn" title="Записать кружок">◯</button>
        <input type="text" id="msgInput" placeholder="Написать сообщение или команду...">
        <button onclick="sendMessage()">Отправить</button>
        <button class="premium-btn" onclick="alert('Цена: 10 рублей. Напишите Ownerу')">Premium</button>
    </div>

    <script>
        function sendMessage() {
            const input = document.getElementById('msgInput');
            const chat = document.getElementById('chat-window');
            if (!input.value) return;

            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            
            // Простая логика команд для тебя
            if (input.value === '/addown') {
                msgDiv.innerHTML = `<span class="prefix-owner">[Owner]</span> Вы активировали права создателя!`;
            } else {
                msgDiv.textContent = input.value;
            }

            chat.appendChild(msgDiv);
            input.value = '';
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
